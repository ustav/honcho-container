name: Build Honcho image

on:
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: "Honcho release tag or exact commit SHA"
        required: true
        default: "main"
        type: string
      publish_latest:
        description: "Also publish the mutable latest tag"
        required: true
        default: false
        type: boolean
      platforms:
        description: "Target platforms"
        required: true
        default: "linux/amd64,linux/arm64"
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: honcho-image-${{ inputs.upstream_ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out packaging repository
        uses: actions/checkout@v4

      - name: Check out Honcho upstream
        uses: actions/checkout@v4
        with:
          repository: plastic-labs/honcho
          ref: ${{ inputs.upstream_ref }}
          path: upstream
          fetch-depth: 1

      - name: Prepare image metadata
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          image="ghcr.io/${owner}/honcho"
          upstream_sha="$(git -C upstream rev-parse HEAD)"
          short_sha="${upstream_sha:0:12}"
          safe_ref="$(printf '%s' '${{ inputs.upstream_ref }}' | tr '/:@ ' '-' | tr -cd '[:alnum:]._-')"
          {
            echo "image=${image}"
            echo "upstream_sha=${upstream_sha}"
            echo "short_sha=${short_sha}"
            echo "safe_ref=${safe_ref}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish
        uses: docker/build-push-action@v6
        with:
          context: ./upstream
          file: ./upstream/Dockerfile
          platforms: ${{ inputs.platforms }}
          push: true
          provenance: mode=max
          sbom: true
          labels: |
            org.opencontainers.image.title=Honcho
            org.opencontainers.image.description=Community-built Honcho container from the official upstream source
            org.opencontainers.image.source=https://github.com/plastic-labs/honcho
            org.opencontainers.image.revision=${{ steps.vars.outputs.upstream_sha }}
            org.opencontainers.image.licenses=AGPL-3.0
          tags: |
            ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.safe_ref }}
            ${{ steps.vars.outputs.image }}:sha-${{ steps.vars.outputs.short_sha }}
            ${{ inputs.publish_latest && format('{0}:latest', steps.vars.outputs.image) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build summary
        run: |
          {
            echo "## Published Honcho image"
            echo
            echo "- Image: \`${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.safe_ref }}\`"
            echo "- Immutable source tag: \`${{ steps.vars.outputs.image }}:sha-${{ steps.vars.outputs.short_sha }}\`"
            echo "- Upstream commit: \`${{ steps.vars.outputs.upstream_sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
