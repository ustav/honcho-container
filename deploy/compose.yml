name: honcho

x-honcho-common: &honcho-common
  image: ${HONCHO_IMAGE:?Set HONCHO_IMAGE in .env}
  env_file:
    - .env
  environment:
    DB_CONNECTION_URI: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}
    CACHE_URL: redis://redis:6379/0?suppress=true
    CACHE_ENABLED: "true"
  restart: unless-stopped

services:
  api:
    <<: *honcho-common
    entrypoint: ["sh", "/app/docker/entrypoint.sh"]
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${HONCHO_BIND_ADDRESS:-0.0.0.0}:${HONCHO_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "/app/.venv/bin/python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2).read()"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  deriver:
    <<: *honcho-common
    entrypoint: ["/app/.venv/bin/python", "-m", "src.deriver"]
    depends_on:
      api:
        condition: service_healthy
      database:
        condition: service_healthy
      redis:
        condition: service_healthy

  database:
    image: ${POSTGRES_IMAGE:-pgvector/pgvector:pg15}
    restart: unless-stopped
    command: ["postgres", "-c", "max_connections=200"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ${DATA_ROOT:?Set DATA_ROOT in .env}/postgres:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: ${REDIS_IMAGE:-redis:8.2-alpine}
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ${DATA_ROOT:?Set DATA_ROOT in .env}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
